<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Products - Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <!-- Admin Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/admin" class="navbar-brand">Admin Panel</a>
            <ul class="navbar-menu">
                <li><a href="/admin">Dashboard</a></li>
                <li><a href="/admin/products" style="color: var(--primary-color);">Manage Products</a></li>
                <li><a href="/admin/products/add">Add Product</a></li>
                <li><a href="/products">Shop (User View)</a></li>
                <li><span th:text="${username}">Admin</span></li>
                <li>
                    <form th:action="@{/auth/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="btn btn-sm btn-outline">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Manage Products</h1>
            <a href="/admin/products/add" class="btn btn-primary btn-lg">Add New Product</a>
        </div>

        <div class="products-grid" th:if="${products != null and !products.isEmpty()}">
            <div class="card" th:each="product : ${products}">
                <img th:src="${product['imageUrl']}" alt="Product" class="card-img"
                     onerror="this.src='https://via.placeholder.com/300x200'" />
                
                <div class="card-body">
                    <h3 class="card-title" th:text="${product['name']}">Product</h3>
                    <p class="card-text" th:text="${product['description']}">Description</p>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem;">
                        <div>
                            <p style="font-size: 0.75rem; color: #718096;">Price</p>
                            <p style="font-weight: 600;">Rs. <span th:text="${product['price']}">0</span></p>
                        </div>
                        <div>
                            <p style="font-size: 0.75rem; color: #718096;">Stock</p>
                            <p style="font-weight: 600;"><span th:text="${product['stock']}">0</span> units</p>
                        </div>
                    </div>
                    
                    <p style="margin-top: 0.5rem;">
                        <span style="font-size: 0.75rem; color: #718096;">Category:</span>
                        <span style="font-weight: 600;" th:text="${product['category']}">N/A</span>
                    </p>
                </div>
                
                <div class="card-footer">
                    <form th:action="@{/admin/products/{id}/delete(id=${product['id']})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this product?');">
                        <button type="submit" class="btn btn-danger btn-block">Delete Product</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${products == null or products.isEmpty()}" class="empty-state">
            <div class="empty-state-icon">No Products</div>
            <h2 class="empty-state-title">No Products Found</h2>
            <a href="/admin/products/add" class="btn btn-primary btn-lg">Add First Product</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 ShopMart Admin Panel. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
